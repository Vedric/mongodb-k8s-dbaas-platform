---
name: Release

"on":
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  validate:
    name: Validate release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Validate tag format
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          if ! echo "${TAG}" | grep -qE '^v[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "ERROR: Tag '${TAG}' does not follow semver format (vX.Y.Z)"
            exit 1
          fi
          echo "TAG=${TAG}" >> "${GITHUB_ENV}"
          echo "Valid tag: ${TAG}"

      - name: Verify CHANGELOG.md contains release entry
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          if ! grep -q "## \[${TAG}\]" CHANGELOG.md 2>/dev/null; then
            if ! grep -q "## ${TAG}" CHANGELOG.md 2>/dev/null; then
              echo "WARNING: No CHANGELOG.md entry found for ${TAG}"
            fi
          fi

  lint:
    name: Lint
    runs-on: ubuntu-latest
    needs: validate
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install yamllint
        run: pip install yamllint

      - name: Run yamllint
        run: yamllint -c .yamllint.yaml .

      - name: Run shellcheck
        uses: ludeeus/action-shellcheck@2.0.0
        with:
          severity: warning

      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  test:
    name: Integration tests
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Create kind cluster
        uses: helm/kind-action@v1
        with:
          cluster_name: mongodb-dbaas
          config: scripts/kind-config.yaml
          node_image: kindest/node:v1.29.12

      - name: Install Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.14.0

      - name: Deploy Percona Operator
        run: |
          kubectl apply -k operator/
          helm repo add percona https://percona.github.io/percona-helm-charts/
          helm repo update percona
          helm upgrade --install psmdb-operator-crds percona/psmdb-operator-crds \
            --namespace mongodb-operator \
            --version 1.22.0
          helm upgrade --install psmdb-operator percona/psmdb-operator \
            --namespace mongodb-operator \
            -f operator/percona-server-mongodb-operator/values.yaml \
            --version 1.22.0 \
            --wait --timeout 120s

      - name: Deploy MongoDB replica set
        run: |
          kubectl create namespace mongodb --dry-run=client -o yaml | kubectl apply -f -
          kubectl create secret generic mongodb-rs-secrets \
            -n mongodb \
            --from-literal=MONGODB_DATABASE_ADMIN_USER=databaseAdmin \
            --from-literal=MONGODB_DATABASE_ADMIN_PASSWORD=databaseAdmin123 \
            --from-literal=MONGODB_CLUSTER_ADMIN_USER=clusterAdmin \
            --from-literal=MONGODB_CLUSTER_ADMIN_PASSWORD=clusterAdmin123 \
            --from-literal=MONGODB_USER_ADMIN_USER=userAdmin \
            --from-literal=MONGODB_USER_ADMIN_PASSWORD=userAdmin123 \
            --from-literal=MONGODB_CLUSTER_MONITOR_USER=clusterMonitor \
            --from-literal=MONGODB_CLUSTER_MONITOR_PASSWORD=clusterMonitor123 \
            --from-literal=MONGODB_BACKUP_USER=backup \
            --from-literal=MONGODB_BACKUP_PASSWORD=backup123
          kubectl apply -k clusters/replicaset/
          echo "Waiting for operator to create pods..."
          for i in $(seq 1 60); do
            if kubectl get pods -n mongodb -l "app.kubernetes.io/instance=mongodb-rs" 2>/dev/null | grep -q "mongodb-rs"; then
              echo "Pods found after ${i}s"
              break
            fi
            sleep 5
          done
          echo "Waiting for replica set pods..."
          kubectl wait --for=condition=ready pod \
            -l app.kubernetes.io/instance=mongodb-rs \
            -n mongodb --timeout=300s || true

      - name: Install bats
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq bats jq

      - name: Run bats tests
        run: |
          export MONGODB_NAMESPACE="mongodb"
          export MONGODB_CLUSTER="mongodb-rs"
          export MONGODB_RS_NAME="rs0"
          export MONGODB_RS_MEMBERS="3"
          bats tests/bats/test_replicaset_health.bats

      - name: Debug on failure
        if: failure()
        run: |
          echo "=== Pod status ==="
          kubectl get pods -A
          echo "=== Events ==="
          kubectl get events -n mongodb --sort-by='.lastTimestamp'
          echo "=== PSMDB CR status ==="
          kubectl get psmdb -n mongodb -o yaml || true
          echo "=== Operator logs ==="
          kubectl logs -n mongodb-operator deploy/psmdb-operator \
            --tail=100 || true
          echo "=== MongoDB pod logs ==="
          for pod in $(kubectl get pods -n mongodb -o name); do
            echo "--- ${pod} ---"
            kubectl logs -n mongodb "${pod}" -c mongod --tail=50 || true
          done

  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Extract tag
        run: echo "TAG=${GITHUB_REF#refs/tags/}" >> "${GITHUB_ENV}"

      - name: Generate release notes
        id: release_notes
        run: |
          # Extract changelog section for this version
          TAG="${GITHUB_REF#refs/tags/}"
          NOTES=""
          if [ -f CHANGELOG.md ]; then
            NOTES=$(awk "/^## .*${TAG}/,/^## /" CHANGELOG.md | head -n -1 | tail -n +2)
          fi

          if [ -z "${NOTES}" ]; then
            # Fall back to commit log since last tag
            PREV_TAG=$(git tag --sort=-v:refname | head -2 | tail -1)
            if [ -n "${PREV_TAG}" ]; then
              NOTES=$(git log "${PREV_TAG}..HEAD" --pretty=format:"- %s" --no-merges)
            else
              NOTES="Initial release"
            fi
          fi

          echo "notes<<EOF" >> "${GITHUB_OUTPUT}"
          echo "${NOTES}" >> "${GITHUB_OUTPUT}"
          echo "EOF" >> "${GITHUB_OUTPUT}"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "${{ env.TAG }}"
          body: ${{ steps.release_notes.outputs.notes }}
          draft: false
          prerelease: ${{ contains(env.TAG, '-rc') || contains(env.TAG, '-beta') || contains(env.TAG, '-alpha') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
