---
version: 2
updates:
  - package-ecosystem: gomod
    directory: /cdc/consumer
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: Europe/Paris
    target-branch: develop
    commit-message:
      prefix: "chore(cdc)"
    labels:
      - "type/security"
      - "scope/cdc"
    open-pull-requests-limit: 5

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: Europe/Paris
    target-branch: develop
    commit-message:
      prefix: "ci"
    labels:
      - "scope/ci"
    open-pull-requests-limit: 5
