---
apiVersion: v1
kind: Namespace
metadata:
  name: api-docs
  labels:
    app.kubernetes.io/name: api-docs
    app.kubernetes.io/part-of: mongodb-dbaas-platform
    app.kubernetes.io/managed-by: platform-team
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: openapi-spec
  namespace: api-docs
  labels:
    app.kubernetes.io/name: swagger-ui
    app.kubernetes.io/component: api-docs
    app.kubernetes.io/part-of: mongodb-dbaas-platform
data:
  mongodb-dbaas-api.yaml: |
    # This will be populated from api/openapi/mongodb-dbaas-api.yaml
    # In production, use a CI step to embed the spec
    # For local dev, mount the file directly
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: swagger-ui
  namespace: api-docs
  labels:
    app.kubernetes.io/name: swagger-ui
    app.kubernetes.io/component: api-docs
    app.kubernetes.io/part-of: mongodb-dbaas-platform
    app.kubernetes.io/managed-by: platform-team
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: swagger-ui
  template:
    metadata:
      labels:
        app.kubernetes.io/name: swagger-ui
        app.kubernetes.io/component: api-docs
        app.kubernetes.io/part-of: mongodb-dbaas-platform
    spec:
      containers:
        - name: swagger-ui
          image: swaggerapi/swagger-ui:v5.21.0
          ports:
            - containerPort: 8080
              name: http
              protocol: TCP
          env:
            - name: SWAGGER_JSON
              value: /spec/mongodb-dbaas-api.yaml
            - name: BASE_URL
              value: /
          volumeMounts:
            - name: openapi-spec
              mountPath: /spec
              readOnly: true
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              memory: 64Mi
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 5
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 3
            periodSeconds: 10
      volumes:
        - name: openapi-spec
          configMap:
            name: openapi-spec
---
apiVersion: v1
kind: Service
metadata:
  name: swagger-ui
  namespace: api-docs
  labels:
    app.kubernetes.io/name: swagger-ui
    app.kubernetes.io/component: api-docs
    app.kubernetes.io/part-of: mongodb-dbaas-platform
spec:
  type: ClusterIP
  ports:
    - port: 8081
      targetPort: http
      protocol: TCP
      name: http
  selector:
    app.kubernetes.io/name: swagger-ui
