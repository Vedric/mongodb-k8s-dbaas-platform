---
# kube-prometheus-stack Helm values for kind development cluster.
# Minimal resource footprint optimized for local development and demos.

# Grafana configuration
grafana:
  enabled: true
  adminUser: admin
  adminPassword: admin
  service:
    type: ClusterIP
    port: 3000
  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      memory: 256Mi
  # Auto-provision dashboards from ConfigMaps with label grafana_dashboard=1
  sidecar:
    dashboards:
      enabled: true
      label: grafana_dashboard
      labelValue: "1"
      searchNamespace: ALL
      folderAnnotation: grafana_folder
    datasources:
      enabled: true
      defaultDatasourceEnabled: true
  # Default datasource for dashboards
  additionalDataSources: []

# Prometheus configuration
prometheus:
  prometheusSpec:
    retention: 2h
    scrapeInterval: 30s
    evaluationInterval: 30s
    resources:
      requests:
        cpu: 100m
        memory: 256Mi
      limits:
        memory: 512Mi
    storageSpec: {}
    # Monitor all namespaces for ServiceMonitors and PodMonitors
    serviceMonitorSelectorNilUsesHelmValues: false
    podMonitorSelectorNilUsesHelmValues: false
    ruleSelectorNilUsesHelmValues: false

# Alertmanager - minimal for demos
alertmanager:
  enabled: true
  alertmanagerSpec:
    resources:
      requests:
        cpu: 10m
        memory: 32Mi
      limits:
        memory: 64Mi

# Node exporter - lightweight system metrics
nodeExporter:
  enabled: true
  resources:
    requests:
      cpu: 10m
      memory: 32Mi
    limits:
      memory: 64Mi

# Kube state metrics - K8s object metrics
kubeStateMetrics:
  enabled: true

# Disable components not needed for demos
kubeProxy:
  enabled: false
kubeScheduler:
  enabled: false
kubeControllerManager:
  enabled: false
kubeEtcd:
  enabled: false
