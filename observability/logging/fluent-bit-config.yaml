---
# Fluent Bit configuration for MongoDB log collection and parsing.
# Collects logs from mongod, backup-agent, and mongos containers,
# parses MongoDB JSON structured logs, and forwards to Loki.
apiVersion: v1
kind: ConfigMap
metadata:
  name: fluent-bit-config
  namespace: logging
  labels:
    app.kubernetes.io/name: fluent-bit
    app.kubernetes.io/component: logging
    app.kubernetes.io/part-of: mongodb-dbaas-platform
    app.kubernetes.io/managed-by: platform-team
  annotations:
    description: >-
      Fluent Bit configuration for MongoDB log collection.
      Parses MongoDB structured JSON logs and forwards to Loki
      with namespace, pod, and component labels.
data:
  fluent-bit.conf: |
    [SERVICE]
        Daemon        Off
        Flush         5
        Log_Level     info
        Parsers_File  parsers.conf
        HTTP_Server   On
        HTTP_Listen   0.0.0.0
        HTTP_Port     2020
        Health_Check  On

    [INPUT]
        Name              tail
        Tag               kube.*
        Path              /var/log/containers/*mongodb*.log
        Parser            docker
        DB                /var/log/flb_kube.db
        Mem_Buf_Limit     10MB
        Skip_Long_Lines   On
        Refresh_Interval  10

    [FILTER]
        Name                kubernetes
        Match               kube.*
        Kube_URL            https://kubernetes.default.svc:443
        Kube_CA_File        /var/run/secrets/kubernetes.io/serviceaccount/ca.crt
        Kube_Token_File     /var/run/secrets/kubernetes.io/serviceaccount/token
        Kube_Tag_Prefix     kube.var.log.containers.
        Merge_Log           On
        Merge_Log_Key       log_parsed
        Keep_Log            Off
        K8S-Logging.Parser  On
        K8S-Logging.Exclude Off
        Labels              On
        Annotations         Off

    [FILTER]
        Name    grep
        Match   kube.*
        Regex   $kubernetes['namespace_name'] ^mongodb

    [FILTER]
        Name          parser
        Match         kube.*
        Key_Name      log
        Parser        mongodb-json
        Reserve_Data  On

    [OUTPUT]
        Name          loki
        Match         kube.*
        Host          loki.logging.svc.cluster.local
        Port          3100
        Labels        job=mongodb, namespace=$kubernetes['namespace_name'], pod=$kubernetes['pod_name'], container=$kubernetes['container_name']
        Remove_Keys   $kubernetes
        Auto_Kubernetes_Labels Off
        Line_Format   json

  parsers.conf: |
    [PARSER]
        Name        docker
        Format      json
        Time_Key    time
        Time_Format %Y-%m-%dT%H:%M:%S.%L
        Time_Keep   On

    [PARSER]
        Name        mongodb-json
        Format      json
        Time_Key    t
        Time_Format %Y-%m-%dT%H:%M:%S.%L%z
        Time_Keep   On
        Types       s:string c:string ctx:string msg:string
