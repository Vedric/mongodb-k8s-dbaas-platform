---
extends: default

rules:
  line-length:
    max: 150
    level: warning
  indentation:
    spaces: 2
    indent-sequences: consistent
  comments:
    require-starting-space: true
    min-spaces-from-content: 1
  document-start:
    present: true
  truthy:
    level: warning
  empty-lines:
    max: 1
  brackets:
    max-spaces-inside: 1
  braces:
    max-spaces-inside: 1

ignore:
  - .pre-commit-config.yaml
  - charts/
  - vendor/
