---
# Strimzi Kafka cluster for CDC event streaming.
# 3-broker cluster with KRaft (no ZooKeeper) for metadata management.
apiVersion: kafka.strimzi.io/v1beta2
kind: Kafka
metadata:
  name: mongodb-cdc
  namespace: kafka
  labels:
    app.kubernetes.io/name: mongodb-cdc
    app.kubernetes.io/component: cdc
    app.kubernetes.io/part-of: mongodb-dbaas-platform
    app.kubernetes.io/managed-by: strimzi
  annotations:
    description: >-
      Kafka cluster for MongoDB CDC pipeline. Receives change events
      from Debezium and distributes them to downstream consumers.
spec:
  kafka:
    version: 3.7.0
    replicas: 3
    listeners:
      - name: plain
        port: 9092
        type: internal
        tls: false
      - name: tls
        port: 9093
        type: internal
        tls: true
    config:
      # Replication factors for internal topics
      offsets.topic.replication.factor: 3
      transaction.state.log.replication.factor: 3
      transaction.state.log.min.isr: 2
      default.replication.factor: 3
      min.insync.replicas: 2
      # Log retention
      log.retention.hours: 168  # 7 days
      log.retention.bytes: -1
      log.segment.bytes: 1073741824  # 1 GB
      # Performance tuning
      num.partitions: 3
      num.network.threads: 3
      num.io.threads: 8
      socket.send.buffer.bytes: 102400
      socket.receive.buffer.bytes: 102400
      socket.request.max.bytes: 104857600
      group.initial.rebalance.delay.ms: 3000
    storage:
      type: persistent-claim
      size: 10Gi
      class: local-path
      deleteClaim: false
    resources:
      requests:
        cpu: 500m
        memory: 1Gi
      limits:
        cpu: "1"
        memory: 2Gi
    metricsConfig:
      type: jmxPrometheusExporter
      valueFrom:
        configMapKeyRef:
          name: kafka-metrics
          key: kafka-metrics-config.yml

  # KRaft metadata (replaces ZooKeeper)
  zookeeper:
    replicas: 3
    storage:
      type: persistent-claim
      size: 5Gi
      class: local-path
      deleteClaim: false
    resources:
      requests:
        cpu: 250m
        memory: 512Mi
      limits:
        cpu: 500m
        memory: 1Gi

  entityOperator:
    topicOperator:
      resources:
        requests:
          cpu: 100m
          memory: 256Mi
        limits:
          cpu: 250m
          memory: 512Mi
    userOperator:
      resources:
        requests:
          cpu: 100m
          memory: 256Mi
        limits:
          cpu: 250m
          memory: 512Mi
---
# Kafka metrics ConfigMap for Prometheus JMX exporter
apiVersion: v1
kind: ConfigMap
metadata:
  name: kafka-metrics
  namespace: kafka
  labels:
    app.kubernetes.io/name: kafka-metrics
    app.kubernetes.io/component: cdc
    app.kubernetes.io/part-of: mongodb-dbaas-platform
    app.kubernetes.io/managed-by: strimzi
data:
  kafka-metrics-config.yml: |
    lowercaseOutputName: true
    lowercaseOutputLabelNames: true
    rules:
      - pattern: "kafka.server<type=(.+), name=(.+), clientId=(.+), topic=(.+), partition=(.*)>Value"
        name: "kafka_server_$1_$2"
        type: GAUGE
        labels:
          clientId: "$3"
          topic: "$4"
          partition: "$5"
      - pattern: "kafka.server<type=(.+), name=(.+), clientId=(.+), brokerHost=(.+), brokerPort=(.+)>Value"
        name: "kafka_server_$1_$2"
        type: GAUGE
        labels:
          clientId: "$3"
          broker: "$4:$5"
      - pattern: "kafka.server<type=(.+), name=(.+)>Value"
        name: "kafka_server_$1_$2"
        type: GAUGE
      - pattern: "kafka.server<type=(.+), name=(.+)>Count"
        name: "kafka_server_$1_$2_total"
        type: COUNTER
