    app.kubernetes.io/part-of: mongodb-dbaas-platform
    app.kubernetes.io/managed-by: kustomize
  annotations:
    description: >-
      Audit log filter configuration for MongoDB sharded cluster.
data:
  mongod.conf: |
    auditLog:
      destination: file
      format: JSON
      path: /var/log/mongodb/audit.json
      filter: >-
        {
          "$or": [
            {
              "atype": {
                "$in": [
                  "authenticate",
                  "authCheck",
                  "createUser",
                  "dropUser",
                  "updateUser",
                  "grantRolesToUser",
                  "revokeRolesFromUser",
                  "createRole",
                  "dropRole",
                  "updateRole",
                  "createDatabase",
                  "dropDatabase",
                  "createCollection",
                  "dropCollection",
                  "createIndex",
                  "dropIndex",
                  "shutdown",
                  "replSetReconfig",
                  "applicationMessage"
                ]
              }
            },
            {
              "atype": "authCheck",
              "param.command": {
                "$in": [
                  "delete",
                  "update",
                  "drop",
                  "dropDatabase",
                  "killCursors",
                  "killOp"
                ]
              }
            }
          ]
        }
