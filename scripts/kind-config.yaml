---
# kind-config.yaml
# Kind cluster configuration for the MongoDB DBaaS platform.
# 3 worker nodes to support anti-affinity rules for replica set members.
kind: Cluster
apiVersion: kind.x-k8s.io/v1alpha4
nodes:
  - role: control-plane
    image: kindest/node:v1.29.12
  - role: worker
    image: kindest/node:v1.29.12
  - role: worker
    image: kindest/node:v1.29.12
  - role: worker
    image: kindest/node:v1.29.12
